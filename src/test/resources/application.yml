spring:
  cloud:
    config:
      enabled: false
  boot:
    admin:
      client:
        enabled: false
  datasource:
    jdbc-url: jdbc:h2:mem:saguapactest;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

# Valores solo para tests (arranque de contexto); en producción usar variables de entorno.
saguapac:
  provider:
    base-url: http://127.0.0.1:59999
    endpoint: /login
    timeout: 3000
    login: test-login
    password: test-pass
    sucursal: "1"
    cajero: "1"
    password-cajero: test-pc
    context-path-clients: /api/clientes/pendientes
    is-mock-enabled: true

provider:
  http:
    connectionTimeout: 3000
    receiveTimeout: 3000
  sql:
    query-get-criteria: >-
      SELECT 100 AS identifier, 705 AS service_id, 1 AS code_externo, 2 AS data_type_code,
      'S' AS is_mandatory, 'CODIGO SOCIO' AS label_criteria, 1 AS minimum_length, 15 AS maximum_length,
      0 AS search_method, CAST(NULL AS VARCHAR(200)) AS values, CAST(NULL AS VARCHAR(200)) AS value_default,
      '1' AS abbreviation, 'CODIGO SOCIO' AS description, 10 AS cod_action, 'codigoSocio' AS alias,
      1 AS flow_code_hab, 'N' AS is_subservice, CAST(NULL AS INTEGER) AS criterion_code_search,
      CAST(NULL AS INTEGER) AS criterion_code_child, 1 AS ordinal, 'TIGO' AS service_name
      FROM DUAL WHERE CAST(:serviceId AS INTEGER) = 705
    schema-ganadero: TEST
    package-srv-name: TEST_PKG
    sp-srv-insert-name: TEST_SP
    allowed-criteria-service-id: 705
